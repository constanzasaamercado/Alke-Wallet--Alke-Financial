{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Alke Wallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        .login-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .login-form-panel {
            width: 530px;
            min-width: 530px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            padding: 3rem;
        }

        .login-form-panel .inner {
            width: 100%;
        }

        .login-form-panel .brand {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
        }

        .login-form-panel .brand img {
            height: 36px;
            margin-right: 10px;
        }

        .login-form-panel .brand span {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .login-form-panel h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .login-form-panel .subtitle {
            font-size: 0.95rem;
            color: #6c757d;
            margin-bottom: 2rem;
        }

        .login-form-panel label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 6px;
            display: block;
        }

        .login-form-panel .form-control {
            border: 1.5px solid #dee2e6;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 0.95rem;
            color: #6c757d;
        }

        .login-form-panel .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
        }

        .btn-login {
            background-color: #0d6efd;
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            color: white;
            margin-top: 0.5rem;
            cursor: pointer;
        }

        .btn-login:hover {
            background-color: #0b5ed7;
        }

        .forgot-password {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
        }

        .forgot-password a {
            color: #6c757d;
            text-decoration: none;
        }

        .forgot-password a:hover {
            color: #0d6efd;
            text-decoration: underline;
        }

        .login-image-panel {
            flex: 1;
            background-image: url('https://wallpapers.com/images/featured/minimalista-verde-yb2hvth6ejp1k4dg.jpg');
            background-size: cover;
            background-position: center;
        }

        @media (max-width: 768px) {
            .login-image-panel {
                display: none;
            }

            .login-form-panel {
                width: 100%;
                min-width: unset;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">

        <div class="login-form-panel">
            <div class="inner">

                <div class="brand">
                    <img src="{% static 'recursos/Logo-Alke-Wallet.svg' %}" alt="Logo Alke Wallet">
                    <span>Alke Wallet</span>
                </div>

                <h2>Bienvenido/a</h2>
                <p class="subtitle">Ingresa a Alke Wallet en línea</p>

                <form method="POST" action="{% url 'login' %}" id="login">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="email">Correo electrónico</label>
                        <input type="email" class="form-control" id="email" name="username"
                            placeholder="Ingresar correo electronico" required />
                    </div>

                    <div class="mb-4">
                        <label for="password">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Ingresar Contraseña" required />
                    </div>
                    {% if error %}
                    <div class="alert alert-danger py-2 mb-3" role="alert">
                        {{ error }}
                    </div>
                    {% endif %}
                    <button type="submit" class="btn-login">Iniciar sesión</button>
                </form>

                <div class="forgot-password">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>
                <div class="text-center mt-3" style="font-size: 0.875rem;">
                    ¿No tienes cuenta? <a href="{% url 'register' %}"
                        style="color: #0d6efd; text-decoration: none; font-weight: 600;">Registrate</a>
                </div>

            </div>
        </div>

        <div class="login-image-panel"></div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'javascript/login.js' %}"></script>
</body>

</html>
